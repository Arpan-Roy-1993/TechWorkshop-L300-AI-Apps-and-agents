name: Deploy Customer Loyalty Agent

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/infra/agents/customer-loyalty.json'
      - 'src/prompts/CustomerLoyaltyAgentPrompt.txt'
      - 'src/app/agents/customerLoyaltyAgent_initializer.py'
      - 'src/app/agents/agent_initializer.py'
      - 'src/app/tools/**'

jobs:
  deploy-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2.1.1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build deployment payload
        env:
          GPT_DEPLOYMENT: ${{ secrets.GPT_DEPLOYMENT }}
        run: |
          PROMPT_FILE="src/prompts/CustomerLoyaltyAgentPrompt.txt"
          JSON_TEMPLATE="src/infra/agents/customer-loyalty.json"
          PROMPT_JSON=$(python3 -c 'import json,sys; print(json.dumps(open(sys.argv[1]).read()))' "$PROMPT_FILE")

          jq \
            --arg MODEL "$GPT_DEPLOYMENT" \
            --argjson INSTRUCTIONS "$PROMPT_JSON" \
            '
            .definition.model = $MODEL
            | .definition.instructions = $INSTRUCTIONS
            ' "$JSON_TEMPLATE" > payload.json

          cat payload.json | jq .

      - name: Deploy agent version
        env:
          FOUNDRY_ENDPOINT: ${{ secrets.FOUNDRY_ENDPOINT }}
        run: |
          az rest \
            --method POST \
            --uri "${FOUNDRY_ENDPOINT}/agents/customer-loyalty/versions?api-version=2025-11-15-preview" \
            --resource "https://ai.azure.com" \
            --headers "Content-Type=application/json" \
            --body @payload.json
